<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아파트잡 | 아파트 전문 구인구직 플랫폼</title>
    <link rel="icon" href="/assets/images/favicon.png" type="image/x-icon">
    <!-- bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Font Awesome (권장 CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css" />
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/assets/css/index.css">
    <link rel="stylesheet" href="/assets/scss/css/resume-view.css">
</head>

<body data-page="resume-form" data-header="sub">
    <!-- PC header -->
    <header id="headerWrap"></header>

    <main id="pages" class="subPage resume-view-page">
        <div class="container resume-container">
            <!-- 제목 -->
            <header class="resume-view-header">
                <h1 id="resumeTitle"></h1>
                <div class="resume-view-header__right d-flex justify-content-between align-items-center">
                    <p class="resume-view-header__date">
                        작성일 <span id="createdAt"></span>
                    </p>
                    <a href="/myPage/resume-form.html" class="btn btn-outline-primary resume-edit-btn">
                        이력서 수정
                    </a>
                </div>
            </header>
            <!-- 기본 정보 -->
            <section class="resume-view-section">
                <h2 class="resume-view-section__title">기본 정보</h2>
                <div class="resume-basic">
                    <div class="resume-basic__profile">
                        <img id="profileImage">
                    </div>
                    <div class="resume-basic__info">
                        <div class="resume-info-row">
                            <span class="label">이름</span>
                            <span id="name"></span>
                        </div>
                        <div class="resume-info-row">
                            <span class="label">생년월일</span>
                            <span id="birth"></span>
                        </div>
                        <div class="resume-info-row">
                            <span class="label">연락처</span>
                            <span id="phone"></span>
                        </div>

                        <div class="resume-info-row">
                            <span class="label">이메일</span>
                            <span id="email"></span>
                        </div>

                        <div class="resume-info-row">
                            <span class="label">주소</span>
                            <span id="address"></span>
                        </div>

                    </div>

                </div>
            </section>

            <!-- 학력 -->
            <section class="resume-view-section">
                <h2 class="resume-view-section__title">학력</h2>
                <div id="educationList"></div>
            </section>

            <!-- 경력 -->
            <section class="resume-view-section">
                <h2 class="resume-view-section__title">경력</h2>
                <div id="careerList"></div>
            </section>

            <!-- 교육 -->
            <section class="resume-view-section">
                <h2 class="resume-view-section__title">교육 이수</h2>
                <div id="trainingList"></div>
            </section>


            <!-- 자격증 -->
            <section class="resume-view-section">
                <h2 class="resume-view-section__title">자격증</h2>
                <div id="licenseList"></div>
            </section>


            <!-- 취업 우대 -->
            <section class="resume-view-section">
                <h2 class="resume-view-section__title">취업 우대 및 병역</h2>
                <div class="resume-preference-view">
                    <!-- badge -->
                    <div id="preferenceBadges" class="resume-preference-badges"></div>
                    <!-- military card -->
                    <div id="militaryCard"></div>
                </div>
            </section>

            <!-- 자기소개 -->
            <section class="resume-view-section">
                <h2 class="resume-view-section__title">자기소개</h2>
                <div id="intro" class="resume-intro"></div>
            </section>

            <div class="resume-view-actions">
                <button class="btn btn-secondary resume-view-btn-print" onclick="window.print()">
                    인쇄하기
                </button>
                <a href="/myPage/resume-form.html" class="btn btn-primary resume-view-btn-edit">
                    이력서 수정
                </a>
                <a href="/myPage/mypage-resume.html" class="btn btn-outline-secondary resume-view-btn-list">
                    이력서 목록보기
                </a>
            </div>
        </div>
    </main>


    <!-- PC footer -->
    <footer id="footer"></footer>

    <!-- 모바일 하단 네비 -->
    <div id="bottomNavWrap"></div>


    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/resume/resume-view.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>

    <script src="/assets/js/login.js"></script>
</body>

</html>
