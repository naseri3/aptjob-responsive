<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아파트잡 | 아파트 전문 구인구직 플랫폼</title>
    <link rel="icon" href="/assets/images/favicon.png" type="image/x-icon">
    <!-- bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Font Awesome (권장 CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css" />
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/assets/css/index.css">
    <link rel="stylesheet" href="/assets/css/page.css">
    <link rel="stylesheet" href="/assets/css/map_search.css">
</head>

<body data-page="jobMap" data-header="sub">
    <!-- PC header -->
    <header id="headerWrap"></header>

    <main id="pages" class="subPage">
        <section id="subPage" class="recruit-search container">
            <h2 class="map-job-header row">
                <span class="col-12 col-md-6 map-job-header__title">내 주변 공고</span>
                <!-- <span class="col-12 col-md-6 map-job-header__desc">
                    * 우리집 주소와 근무지까지의 <strong>직선거리</strong>를 확인해보세요
                </span> -->
            </h2>

            <div class="map-search">
                <!-- 상단 검색 바 -->
                <div class="map-search__top">
                    <button type="button" class="region-btn" id="regionBtn" onclick="toggleRegion()">
                        <span class="region-btn__text">지역</span>
                        <span class="region-btn__arrow"></span>
                    </button>
                    <div class="location-search">
                        <span>우리집 주소 :</span>
                        <input type="text" id="homeAddressInput" class="home-address" placeholder="서울 중구 세종대로 110"
                            readonly>
                        <button type="button" class="btn-move">이동</button>
                    </div>
                </div>

                <!-- 드롭다운 -->
                <div id="regionDropdown" class="region-dropdown">
                    <!-- 헤더 -->
                    <div class="region-header">
                        <div class="region-dropdown__col">시·도</div>
                        <div class="region-dropdown__col">구·군</div>
                    </div>

                    <div class="region-body">
                        <!-- 시/도 -->
                        <ul class="region-list" id="sidoList"></ul>
                        <!-- 구/군 -->
                        <ul class="region-list" id="gugunList"></ul>
                    </div>
                    <!-- 버튼 -->
                    <div class="region-actions">
                        <button type="button" class="btn-cancel">취소</button>
                        <button type="button" class="btn-search">검색</button>
                    </div>
                </div>
            </div>

            <div id="MapArea">
                <div id="mapAlert" class="map-alert">
                    지도는 시·군 단위까지만 확인하실 수 있습니다
                </div>
                <div id="map" class="mapView"></div>

                <!-- 지도 안 우측 슬라이드 패널 -->
                <aside id="jobPanel" class="job-panel" aria-hidden="true">
                    <div class="job-panel__header">
                        <h4 class="job-panel__title">채용공고</h4>
                        <button type="button" class="job-panel__close" onclick="closePanel()"
                            aria-label="채용정보 닫기">✕</button>
                    </div>

                    <div id="jobPanelContent" class="job-panel__body">
                        <div class="job-panel__empty"></div>
                    </div>
                </aside>

                <div class="mapView__job d-none d-lg-block">
                    <h5>직무 선택</h5>
                    <div class="job-filter">
                        <button class="job-filter__btn is-active" onclick="filterMarkers('전체', event)" data-job="전체">
                            <img src="/assets/icons/mapapidoc/map-marker-icon.png" class="job-filter__icon" alt="">
                            전체
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('소장', event)" data-job="소장">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-1.png" class="job-filter__icon" alt="">
                            소장
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('관리과장', event)" data-job="관리과장">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-1.png" class="job-filter__icon" alt="">
                            관리과장
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('관리주임', event)" data-job="관리주임">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-1.png" class="job-filter__icon" alt="">
                            관리주임
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('경리(회계)', event)" data-job="경리(회계)">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-2.png" class="job-filter__icon" alt="">
                            경리(회계)
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('서무직', event)" data-job="서무직">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-2.png" class="job-filter__icon" alt="">
                            서무직
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('기술과장', event)" data-job="기술과장">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-3.png" class="job-filter__icon" alt="">
                            기술과장
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('시설과장', event)" data-job="시설과장">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-3.png" class="job-filter__icon" alt="">
                            시설과장
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('시설기사', event)" data-job="시설기사">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-3.png" class="job-filter__icon" alt="">
                            시설기사
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('설비직(영선)', event)" data-job="설비직(영선)">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-3.png" class="job-filter__icon" alt="">
                            설비직(영선)
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('기전직', event)" data-job="기전직">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-3.png" class="job-filter__icon" alt="">
                            기전직
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('조경기사', event)" data-job="조경기사">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-3.png" class="job-filter__icon" alt="">
                            조경기사
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('전기과장', event)" data-job="전기과장">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-4.png" class="job-filter__icon" alt="">
                            전기과장
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('전기기사', event)" data-job="전기기사">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-4.png" class="job-filter__icon" alt="">
                            전기기사
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('전기직', event)" data-job="전기직">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-4.png" class="job-filter__icon" alt="">
                            전기직
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('커뮤니티', event)" data-job="커뮤니티">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-5.png" class="job-filter__icon" alt="">
                            커뮤니티
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('경비원', event)" data-job="경비원">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-5.png" class="job-filter__icon" alt="">
                            경비원
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('미화원', event)" data-job="미화원">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-5.png" class="job-filter__icon" alt="">
                            미화원
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('기타', event)" data-job="기타">
                            <img src="/assets/icons/mapapidoc/map-marker-icon-5.png" class="job-filter__icon" alt="">
                            기타
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>


    <!-- PC footer -->
    <footer id="footer"></footer>
    <!-- Back to Top -->
    <div id="backToTopWrap"></div>
    <!-- 모바일 하단 네비 -->





    <div id="bottomNavWrap"></div>

    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=1aeb3e9a49e983e68615734accc31d91&libraries=services,clusterer,drawing"></script>

    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/search/recruitSearch.js" defer></script>
    <script src="/assets/js/search/searchLoader.js"></script>


    <script src="/assets/js/map/map-core.js"></script>
    <script src="/assets/js/map/map-data.js"></script>
    <script src="/assets/js/map/map-marker.js"></script>
    <script src="/assets/js/map/map-panel.js"></script>
    <script src="/assets/js/map/map-filter.js"></script>
    <script src="/assets/js/map/map-search.js"></script>
    <script src="/assets/js/map/map-job-list.js"></script>

    <!-- 실시간 공고 (모듈) -->
    <script type="module" src="/assets/js/job/renderJob.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="/assets/js/login.js"></script>
</body>

</html>
